<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100vh;min-width:100%;background:#0d0f14;font-family:'Inter',system-ui,sans-serif;color:#c8d0d8;overflow:hidden;user-select:none}
.topbar{display:flex;align-items:center;gap:0;background:#141820;border-bottom:1px solid #1e2530;height:36px;padding:0 8px;flex-shrink:0}
.collab-btn{display:flex;flex-direction:column;align-items:center;padding:0 10px;font-size:9px;color:#4a6070;border-right:1px solid #1e2530;height:36px;justify-content:center;gap:2px}
.session-btns{display:flex;gap:6px;padding:0 10px;border-right:1px solid #1e2530;align-items:center;height:36px}
.sbtn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.sbtn.start{background:#00ffc8;color:#041014}
.sbtn.join{background:#1e2530;color:#8090a0;border:1px solid #2a3040}
.nav-tabs{display:flex;align-items:center;height:36px;overflow-x:auto;scrollbar-width:none;flex:1}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{padding:0 12px;height:36px;display:flex;align-items:center;gap:5px;font-size:11px;color:#4a6070;cursor:pointer;border-right:1px solid #1e2530;white-space:nowrap;transition:all .12s;flex-shrink:0}
.ntab.on{color:#00ffc8;background:rgba(0,255,200,.06)}
.export-btn{margin-left:auto;padding:5px 14px;border-radius:5px;background:#00ffc8;color:#041014;font-size:11px;font-weight:800;border:none;cursor:pointer;flex-shrink:0}
.transport{display:flex;align-items:center;gap:8px;background:#0f1218;border-bottom:1px solid #1e2530;padding:6px 12px;height:44px;flex-shrink:0}
.tport-btn{width:28px;height:28px;border-radius:4px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.tport-play{background:#00ffc8;color:#041014;font-size:14px}
.tport-stop{background:#1e2530;color:#8090a0}
.tport-rec{background:rgba(255,45,85,.15);color:#ff2d55;border:1px solid rgba(255,45,85,.3)}
.tport-rec.armed{background:#ff2d55;color:#fff;animation:recpulse 1s ease-in-out infinite}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,85,.4)}50%{box-shadow:0 0 0 6px rgba(255,45,85,0)}}
.bpm-val{font-size:17px;font-weight:800;color:#e0eaf0;font-family:'Courier New',monospace;min-width:38px}
.bpm-lbl{font-size:10px;color:#4a6070;letter-spacing:.5px}
.divider{width:1px;height:24px;background:#1e2530;margin:0 4px}
.time-display{font-size:14px;font-weight:700;color:#00ffc8;font-family:'Courier New',monospace;letter-spacing:1px;min-width:80px}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.track-list{width:160px;flex-shrink:0;background:#0a0c12;border-right:1px solid #1e2530;overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column}
.track-list::-webkit-scrollbar{display:none}
.track-hd{height:28px;background:#080a0e;border-bottom:1px solid #1e2530;display:flex;align-items:center;padding:0 10px;font-size:9px;font-weight:700;color:#4a6070;letter-spacing:1px;flex-shrink:0}
.track-row{height:48px;border-bottom:1px solid #0d1018;display:flex;align-items:center;padding:0 8px;gap:6px;cursor:pointer;transition:background .12s;flex-shrink:0}
.track-row.selected{background:rgba(0,255,200,.05)}
.track-color{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.track-info{flex:1;min-width:0}
.track-name{font-size:11px;font-weight:600;color:#c0d0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-type{font-size:9px;color:#4a6070;margin-top:2px}
.track-btns{display:flex;gap:3px}
.tbtn{width:16px;height:16px;border-radius:3px;border:none;font-size:8px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#1e2530;color:#4a6070}
.tbtn.on{background:#00ffc8;color:#000}
.tbtn.rec-on{background:#ff2d55;color:#fff}
.timeline-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ruler{height:28px;background:#080a0e;border-bottom:1px solid #1e2530;position:relative;overflow:hidden;flex-shrink:0}
.clip-area{flex:1;overflow:hidden;position:relative;background:repeating-linear-gradient(90deg,transparent,transparent 99px,#0d1018 99px,#0d1018 100px)}
.track-lane{height:48px;border-bottom:1px solid #0d1018;position:relative;flex-shrink:0}
.clip{position:absolute;top:5px;height:38px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:0 6px 4px;cursor:pointer;overflow:hidden}
.clip-label{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.playhead{position:absolute;top:0;bottom:0;width:2px;background:#00ffc8;z-index:10;box-shadow:0 0 8px #00ffc8;pointer-events:none}
.playhead::before{content:'';position:absolute;top:-1px;left:-5px;width:12px;height:10px;background:#00ffc8;clip-path:polygon(0 0,100% 0,50% 100%)}
.fx-panel{width:90px;flex-shrink:0;background:#0a0c12;border-left:1px solid #1e2530;display:flex;flex-direction:column}
.fx-btn{margin:3px 6px;padding:4px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid #2a3040;background:#111620;color:#6a8090;cursor:pointer;text-align:center}
.fx-btn.on{background:rgba(0,255,200,.12);border-color:#00ffc8;color:#00ffc8}
.mixer{height:110px;border-top:2px solid #00ffc822;background:#07090f;display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.mixer::-webkit-scrollbar{display:none}
.mixer-ch{width:52px;flex-shrink:0;border-right:1px solid #0d1018;display:flex;flex-direction:column;align-items:center;padding:4px 3px;gap:0}
.ch-name{font-size:8px;color:#4a6070;text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ch-fader{-webkit-appearance:none;appearance:none;width:44px;height:3px;border-radius:2px;background:#1e2530;outline:none;transform:rotate(-90deg);margin:6px 0}
.ch-fader::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:var(--fc,#00ffc8);cursor:pointer}
.ch-vol{font-size:8px;color:#4a6070;font-family:'Courier New',monospace;margin-top:1px}
.ch-vu{display:flex;gap:1px;height:14px;align-items:flex-end}
.ch-vu-bar{width:5px;border-radius:1px;background:#1e2530;transition:height .06s,background .06s}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">
<div class="topbar">
  <div class="collab-btn">&#129309;<span style="font-size:8px;color:#4a6070">Collab</span></div>
  <div class="session-btns">
    <button class="sbtn start">+ Start Session</button>
    <button class="sbtn join">Join Session</button>
  </div>
  <div class="nav-tabs">
    <div class="ntab on">&#127897; Arrange</div>
    <div class="ntab">&#9000; Mixer Console</div>
    <div class="ntab">&#127929; Piano Roll</div>
    <div class="ntab">&#129345; Beat Maker</div>
    <div class="ntab">&#127935; AI Mix</div>
    <div class="ntab">&#9889; Synth</div>
    <div class="ntab">&#129345; Drum Design</div>
    <div class="ntab">&#10024; Mastering</div>
  </div>
  <button class="export-btn">&#11014; Export</button>
</div>
<div class="transport">
  <button class="tport-btn tport-stop">&#9632;</button>
  <button class="tport-btn tport-play" id="playBtn" onclick="togglePlay()">&#9654;</button>
  <button class="tport-btn tport-rec" id="recBtn">&#9210;</button>
  <div class="divider"></div>
  <span class="bpm-lbl">BPM</span>
  <span class="bpm-val">120</span>
  <div class="divider"></div>
  <div class="time-display" id="timeDisplay">1.1.000</div>
  <div class="divider"></div>
  <select style="background:#1e2530;border:1px solid #2a3040;color:#8090a0;font-size:10px;padding:3px 6px;border-radius:4px;outline:none"><option>1/4</option><option>1/8</option><option>1/16</option></select>
  <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <span style="font-size:10px;color:#4a6070">ZOOM</span>
    <button style="padding:3px 8px;border-radius:4px;border:1px solid #00ffc8;background:rgba(0,255,200,.1);color:#00ffc8;font-size:10px;cursor:pointer">100%</button>
    <button style="padding:5px 10px;border-radius:4px;background:rgba(255,45,85,.15);border:1px solid rgba(255,45,85,.3);color:#ff2d55;font-size:10px;font-weight:700;cursor:pointer">&#9210; REC READY</button>
  </div>
</div>
<div class="main">
  <div class="track-list">
    <div class="track-hd">TRACKS</div>
    <div id="trackList"></div>
  </div>
  <div class="timeline-wrap">
    <div class="ruler" id="ruler"></div>
    <div class="clip-area" id="clipArea">
      <div class="playhead" id="playhead" style="left:0"></div>
    </div>
  </div>
  <div class="fx-panel">
    <div class="track-hd">FX</div>
    <div class="fx-btn on">EQ</div>
    <div class="fx-btn on">Comp</div>
    <div class="fx-btn">Reverb</div>
    <div class="fx-btn">Delay</div>
    <div class="fx-btn on">Limiter</div>
    <div class="fx-btn">Distort</div>
    <div class="fx-btn">Chorus</div>
    <div class="fx-btn">Filter</div>
  </div>
</div>
<div class="mixer" id="mixer"></div>
<script>
const TRACKS=[
  {name:'Lead Vocals',type:'Audio',color:'#00ffc8',clips:[{x:0,w:150,label:'Verse 1'},{x:190,w:110,label:'Chorus'},{x:340,w:80,label:'Bridge'}]},
  {name:'Harmony',type:'Audio',color:'#00aaff',clips:[{x:190,w:110,label:'Harmony'},{x:340,w:80,label:'Harm 2'}]},
  {name:'Kick 808',type:'Beat',color:'#ff6b35',clips:[{x:0,w:390,label:'Beat Pattern'}]},
  {name:'Snare',type:'Beat',color:'#ffd700',clips:[{x:0,w:390,label:'Snare Loop'}]},
  {name:'Hi-Hat',type:'Beat',color:'#a78bfa',clips:[{x:0,w:190,label:'HH Loop'},{x:210,w:180,label:'HH Loop 2'}]},
  {name:'Bass Line',type:'MIDI',color:'#ff4466',clips:[{x:0,w:150,label:'Bass A'},{x:190,w:190,label:'Bass B'}]},
  {name:'Chord Pad',type:'MIDI',color:'#00ff88',clips:[{x:80,w:270,label:'Pads'}]},
  {name:'Lead Synth',type:'MIDI',color:'#ff8800',clips:[{x:190,w:150,label:'Lead Mel'}]},
];

const trackList=document.getElementById('trackList');
const clipArea=document.getElementById('clipArea');

TRACKS.forEach((t,i)=>{
  const row=document.createElement('div');
  row.className='track-row'+(i===0?' selected':'');
  row.innerHTML=`<div class="track-color" style="background:${t.color}"></div><div class="track-info"><div class="track-name">${t.name}</div><div class="track-type">${t.type}</div></div><div class="track-btns"><button class="tbtn">M</button><button class="tbtn">S</button><button class="tbtn">&#9210;</button></div>`;
  row.onclick=()=>{document.querySelectorAll('.track-row').forEach(r=>r.classList.remove('selected'));row.classList.add('selected');};
  trackList.appendChild(row);

  const lane=document.createElement('div');
  lane.className='track-lane';
  t.clips.forEach(c=>{
    const clip=document.createElement('div');
    clip.className='clip';
    clip.style.cssText=`left:${c.x+4}px;width:${c.w-8}px;background:${t.color}22;border:1px solid ${t.color}55;`;
    const lbl=document.createElement('div');
    lbl.className='clip-label';
    lbl.style.color=t.color;
    lbl.textContent=c.label;
    clip.appendChild(lbl);
    lane.appendChild(clip);
  });
  clipArea.appendChild(lane);
});

// Ruler
const ruler=document.getElementById('ruler');
for(let i=0;i<20;i++){
  const m=document.createElement('div');
  m.style.cssText=`position:absolute;left:${i*100}px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:3px`;
  m.innerHTML=`<span style="font-size:9px;color:#4a6070;font-family:'Courier New',monospace;padding-left:3px">${i+1}</span>`;
  const line=document.createElement('div');
  line.style.cssText=`position:absolute;top:0;bottom:0;left:0;width:1px;background:${i===0?'#2a3040':'#1e2530'}`;
  m.appendChild(line);
  ruler.appendChild(m);
}

// Mixer
const mixer=document.getElementById('mixer');
[...TRACKS.slice(0,7),{name:'Master',color:'#fff'}].forEach((t,i)=>{
  const ch=document.createElement('div');
  ch.className='mixer-ch';
  ch.innerHTML=`<div class="ch-name" style="color:${t.color}">${t.name}</div><div class="ch-vu" id="vu-${i}"></div><input type="range" class="ch-fader" min="0" max="100" value="${75+Math.random()*20|0}" style="--fc:${t.color}"><div class="ch-vol" style="color:${t.color}">${75+Math.random()*20|0}%</div>`;
  mixer.appendChild(ch);
  const vu=ch.querySelector('.ch-vu');
  for(let j=0;j<5;j++){const b=document.createElement('div');b.className='ch-vu-bar';b.style.width='5px';vu.appendChild(b);}
});

// Playback
let isPlaying=false,pos=0,frame=0,raf=null;
function togglePlay(){
  isPlaying=!isPlaying;
  const btn=document.getElementById('playBtn');
  btn.textContent=isPlaying?'⏸':'▶';
  btn.style.background=isPlaying?'#ff6b35':'#00ffc8';
  if(isPlaying)raf=requestAnimationFrame(tick);
  else cancelAnimationFrame(raf);
}
function tick(){
  frame++;
  pos+=0.5;
  if(pos>450)pos=0;
  document.getElementById('playhead').style.left=pos+'px';
  const bars=Math.floor(pos/100)+1;
  const beats=Math.floor((pos%100)/25)+1;
  const ticks=Math.floor((pos%25)*40);
  document.getElementById('timeDisplay').textContent=`${bars}.${beats}.${String(ticks).padStart(3,'0')}`;
  // VU meters
  mixer.querySelectorAll('.ch-vu').forEach((vu,i)=>{
    const lvl=Math.round(Math.abs(Math.sin(frame/6+i)*3+Math.random()*2));
    vu.querySelectorAll('.ch-vu-bar').forEach((b,j)=>{
      const active=j<lvl;
      b.style.height=active?`${6+j*2}px`:'3px';
      b.style.background=active?(j>=3?'#ff2d55':j>=2?'#ffd700':TRACKS[i]?.color||'#00ffc8'):'#1e2530';
    });
  });
  if(isPlaying)raf=requestAnimationFrame(tick);
}
document.querySelectorAll('.ntab').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));b.classList.add('on');};});
document.querySelectorAll('.fx-btn').forEach(b=>{b.onclick=()=>b.classList.toggle('on');});
setTimeout(togglePlay,500);
</script>
</body></html>
