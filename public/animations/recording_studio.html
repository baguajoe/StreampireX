cat > public/animations/recording_studio.html <<'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamPireX Hero Animation</title>
  <style>
    :root {
      --bg1: #07111c;
      --bg2: #0a1c2d;
      --bg3: #06131f;
      --teal: #00ffc8;
      --orange: #ff6600;
      --white: #ffffff;
      --muted: #b9d6df;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 255, 200, 0.12), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 102, 0, 0.10), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: -10%;
      background-image:
        linear-gradient(rgba(0, 255, 200, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 200, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(900px) rotateX(70deg) translateY(18%);
      transform-origin: center;
      opacity: 0.18;
      animation: gridMove 12s linear infinite;
    }

    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(0, 255, 200, 0.22);
      box-shadow: 0 0 30px rgba(0, 255, 200, 0.10);
    }

    .ring.r1 {
      width: 240px;
      height: 240px;
      animation: spin 14s linear infinite;
    }

    .ring.r2 {
      width: 360px;
      height: 360px;
      border-color: rgba(255, 102, 0, 0.20);
      animation: spinReverse 20s linear infinite;
    }

    .ring.r3 {
      width: 520px;
      height: 520px;
      border-color: rgba(0, 255, 200, 0.10);
      animation: spin 28s linear infinite;
    }

    .core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 170px;
      height: 170px;
      transform: translate(-50%, -50%);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(0, 255, 200, 0.18);
      box-shadow:
        0 0 40px rgba(0, 255, 200, 0.10),
        inset 0 0 24px rgba(0, 255, 200, 0.05);
      backdrop-filter: blur(4px);
      animation: floaty 4s ease-in-out infinite;
    }

    .logo {
      position: absolute;
      top: 22%;
      width: 100%;
      text-align: center;
      font-size: 46px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--white);
      text-shadow: 0 0 18px rgba(0, 255, 200, 0.14);
      animation: fadeUp 1.4s ease both;
    }

    .logo span {
      color: var(--teal);
    }

    .subtitle {
      position: absolute;
      top: 34%;
      width: 100%;
      text-align: center;
      color: var(--muted);
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.4px;
      animation: fadeUp 1.6s ease both;
    }

    .pill {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(0, 255, 200, 0.24);
      color: var(--teal);
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(0, 255, 200, 0.10);
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .pill.top {
      top: 12%;
      animation: fadeUp 1.8s ease both;
    }

    .pill.bottom {
      bottom: 10%;
      animation: fadeUp 2s ease both;
    }

    .bars {
      position: absolute;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 140px;
    }

    .bar {
      width: 14px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(180deg, var(--teal), #0aa37e);
      box-shadow: 0 0 16px rgba(0, 255, 200, 0.24);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .bar:nth-child(1) { height: 30px; animation-delay: 0s; }
    .bar:nth-child(2) { height: 58px; animation-delay: 0.1s; }
    .bar:nth-child(3) { height: 88px; animation-delay: 0.2s; }
    .bar:nth-child(4) { height: 48px; animation-delay: 0.3s; }
    .bar:nth-child(5) { height: 110px; animation-delay: 0.4s; }
    .bar:nth-child(6) { height: 66px; animation-delay: 0.5s; }
    .bar:nth-child(7) { height: 92px; animation-delay: 0.6s; }
    .bar:nth-child(8) { height: 42px; animation-delay: 0.7s; }

    .orb {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 20px rgba(255, 102, 0, 0.55);
    }

    .orb.o1 {
      top: 18%;
      left: 20%;
      animation: drift1 8s ease-in-out infinite;
    }

    .orb.o2 {
      top: 24%;
      right: 18%;
      animation: drift2 10s ease-in-out infinite;
    }

    .orb.o3 {
      bottom: 24%;
      left: 16%;
      animation: drift3 9s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: translate(-50%, -50%) rotate(360deg); }
      to { transform: translate(-50%, -50%) rotate(0deg); }
    }

    @keyframes bounce {
      0%, 100% {
        transform: scaleY(0.55);
        opacity: 0.75;
      }
      50% {
        transform: scaleY(1.05);
        opacity: 1;
      }
    }

    @keyframes floaty {
      0%, 100% {
        transform: translate(-50%, -50%) translateY(0);
      }
      50% {
        transform: translate(-50%, -50%) translateY(-10px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gridMove {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 60px, 60px 0; }
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -20px); }
    }

    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-25px, 22px); }
    }

    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(18px, -26px); }
    }

    @media (max-width: 900px) {
      .logo {
        font-size: 34px;
        top: 20%;
      }

      .subtitle {
        font-size: 16px;
        top: 31%;
        padding: 0 20px;
      }

      .pill {
        font-size: 12px;
        padding: 10px 14px;
        max-width: 90%;
        text-align: center;
        white-space: normal;
      }

      .ring.r1 {
        width: 180px;
        height: 180px;
      }

      .ring.r2 {
        width: 280px;
        height: 280px;
      }

      .ring.r3 {
        width: 400px;
        height: 400px;
      }

      .core {
        width: 130px;
        height: 130px;
      }

      .bars {
        height: 100px;
        gap: 8px;
        bottom: 16%;
      }

      .bar {
        width: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="grid"></div>

    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>

    <div class="pill top">AI Studio • Beat Maker • Recording • Distribution</div>

    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>

    <div class="core"></div>

    <div class="logo">Stream<span>PireX</span></div>
    <div class="subtitle">The all-in-one creator platform</div>

    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="pill bottom">Replace 15+ tools • Keep 90%</div>
  </div>
</body>
</html>
EOF
